<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BAZODIAC Cursor FX Demo</title>
  <link rel="stylesheet" href="./cursor-fx.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 20%, rgba(99,102,241,.10), transparent 42%),
        #05070a;
      color: #f8f9fa;
      font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }
    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .panel {
      position: relative;
      z-index: 2;
      width: min(840px, calc(100% - 40px));
      padding: clamp(28px, 5vw, 64px);
      border: 1px solid rgba(212,175,55,.18);
      background: rgba(255,255,255,.035);
      backdrop-filter: blur(14px) saturate(160%);
      border-radius: 28px;
      text-align: center;
    }
    .kicker {
      display: block;
      color: rgba(212,175,55,.78);
      text-transform: uppercase;
      letter-spacing: .32em;
      font-size: 11px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-weight: 200;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: clamp(36px, 8vw, 88px);
      line-height: .98;
    }
    p {
      margin: 24px auto 0;
      color: rgba(255,255,255,.58);
      max-width: 58ch;
      line-height: 1.8;
    }
    .actions {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .interactive {
      display: inline-flex;
      border: 1px solid #D4AF37;
      color: #D4AF37;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: 11px;
      background: transparent;
    }
    .interactive:hover { background: #D4AF37; color: #05070a; }
  </style>
</head>
<body>
  <!-- Optional explicit layers. JS can also auto-create them if omitted. -->
  <div class="cursorfx-film-grain"></div>
  <div class="cursorfx-vignette" id="vignette"></div>
  <div class="cursorfx-nebula-lens" id="nebula-lens"></div>
  <div class="cursorfx-dot" id="custom-cursor"></div>
  <div class="cursorfx-ring" id="cursor-ring"></div>

  <section class="hero">
    <canvas id="hero-vortex" class="cursorfx-vortex"></canvas>

    <div class="panel">
      <span class="kicker">Extracted cursor animation</span>
      <h1>Signal<br>Decoded</h1>
      <p>
        Bewege die Maus: Dot folgt schnell, Ring folgt verzögert, Nebula-Lens driftet langsam,
        Vignette zentriert sich sofort und der Canvas-Vortex zieht Linien zum Pointer.
      </p>
      <div class="actions">
        <a class="interactive" href="#">Interactive Link</a>
        <button class="interactive">Hover Button</button>
      </div>
    </div>
  </section>

  <script src="./cursor-fx.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      new window.BazodiacCursorFX.ConnectedCursorVortex("#hero-vortex");
    });
  </script>
</body>
</html>
